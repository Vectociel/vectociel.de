<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vectociel GmbH</title>
  <meta name="description" content="Vectociel GmbH – Krefeld" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E▲%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      --bg: #0b0f17;
      --bg-soft: #111827;
      --fg: #e5e7eb;
      --muted: #9ca3af;
      --accent: #6366f1;
      --border: #1f2937;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #1a2236 0%, var(--bg) 60%);
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      line-height: 1.6;
    }
    .card {
      width: 100%;
      max-width: 560px;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }
    .logo {
      font-size: 40px;
      color: var(--accent);
      margin-bottom: 16px;
    }
    h1 {
      font-size: 28px;
      letter-spacing: 0.5px;
      margin-bottom: 28px;
    }
    .info {
      color: var(--muted);
      font-size: 16px;
    }
    .info p { margin: 6px 0; }
    .label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #6b7280;
      margin-top: 22px;
      margin-bottom: 4px;
    }
    a {
      color: var(--accent);
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    .footer {
      margin-top: 36px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">▲</div>
    <h1>Vectociel GmbH</h1>

    <div class="info">
      <span class="label">Adresse</span>
      <p>Nauenweg 38D<br />47805 Krefeld</p>

      <span class="label">E-Mail</span>
      <p><a href="mailto:info@vectociel.de">info@vectociel.de</a></p>
    </div>

    <div class="footer">
      © <span id="year"></span> Vectociel GmbH
    </div>
  </main>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
